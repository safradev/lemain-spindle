name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: presentation/package-lock.json

      - name: Build Windows package
        shell: pwsh
        run: .\packaging\windows\build.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lemain-spindle-windows-0.1.1
          path: |
            presentation/release/*.exe
            presentation/release/*.yml
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            presentation/release/Lemain-Spindle-*-portable.exe
            presentation/release/Lemain-Spindle-*-setup.exe
